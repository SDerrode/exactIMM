name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        # The GUI smoke tests (tests/test_*_gui.py) need a Qt binding (PyQt6),
        # which is in the optional `gui` extra and not installed on CI. Disable
        # the pytest-qt plugin (it errors at startup without a binding) and skip
        # those two files so the suite runs headless. They still run locally via
        # `pip install -e ".[dev,gui]"`.
        run: pytest -p no:pytest-qt --ignore=tests/test_param_panel_gui.py --ignore=tests/test_main_window_gui.py --cov=prg --cov-report=term --cov-report=xml --tb=short

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
