# exactIMM – Application configuration
# Edit this file to tune simulation and I/O parameters.
# Only the keys below are read by the code (general.log_level,
# paths.data_simulated, paths.logs); everything else is hard-coded.

[general]
log_level = "INFO"   # DEBUG | INFO | WARNING | ERROR

[paths]
data_simulated = "data/simulated"
logs           = "logs"
